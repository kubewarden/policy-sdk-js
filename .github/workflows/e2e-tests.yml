on:
  - push
  - pull_request
  - workflow_call

name: Continuous integration
jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: kubewarden/github-actions/policy-gh-action-dependencies@0f1672d63bd3572f204917d68390d87f7430069a # v5.0.0
      - name: Install kwctl
        uses: kubewarden/github-actions/kwctl-installer@0f1672d63bd3572f204917d68390d87f7430069a # v5.0.0
      - name: Install javy
        uses: ./.github/actions/javy-installer
      - name: Install npm dependencies in js directory
        run: |
          cd js
          npm install

      - name: Run e2e tests
        run: make e2e-tests
